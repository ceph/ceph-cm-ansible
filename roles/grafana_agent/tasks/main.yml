---
- name: Include secrets
  include_vars: "{{ secrets_path | mandatory }}/mimir_password.yml"
  no_log: true
  tags:
    - always

- name: Gather facts on listening ports
  community.general.listen_ports_facts:
  tags:
    - always

# Resolving selinux conflicts
- import_tasks: useradd-selinux.yml
  when: ansible_os_family == "RedHat"


- name: Fail if prometheus is listening on port 9090 (conflicts with grafana-agent)
  ansible.builtin.fail:
    msg: |
      ERROR: Port conflict detected!

      The '{{ item.name }}' service (PID {{ item.pid }}) is listening on port {{ item.port }}.

      grafana-agent is meant to scrape metrics and forward them to Mimir.
      Having prometheus listening on 9090 creates a port conflict.

      Please do one of the following:
        1. Change prometheus to listen on a different port (recommended, e.g. 9091)
        2. Disable or remove the prometheus service if you want to use grafana-agent instead

      After fixing the conflict, re-run this playbook.
  vars:
    tcp_listen_violations: "{{ ansible_facts.tcp_listen | selectattr('port', 'equalto', 9090) | list }}"
  loop: "{{ tcp_listen_violations }}"
  when:
    - ansible_facts.tcp_listen is defined
    - tcp_listen_violations | length > 0
  tags:
    - always

# Install node_exporter
- name: Install prometheus-node-exporter (Debian/Ubuntu)
  become: true
  ansible.builtin.package:
    name: prometheus-node-exporter
    state: present
  when: ansible_os_family == "Debian"

- name: Install EPEL repository (RedHat)
  become: true
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_os_family == "RedHat"

- name: Install node_exporter (RedHat family)
  become: true
  ansible.builtin.package:
    name: node_exporter
    state: present
  when: ansible_os_family == "RedHat"

# Determine correct service name
- name: Determine node_exporter service name
  ansible.builtin.set_fact:
    node_exporter_service_name: "{{ 'prometheus-node-exporter' if ansible_pkg_mgr == 'apt' else 'node_exporter' }}"

# Enable and start node_exporter
- name: Enable and start node_exporter
  become: true
  ansible.builtin.systemd:
    name: "{{ node_exporter_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: "Ensure that path /etc/apt/keyrings exists"
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
    force: true
  when: ansible_pkg_mgr == "apt"
  register: keyrings_exists

- name: Remove conflicting Grafana key file if exists
  ansible.builtin.file:
    path: /etc/apt/keyrings/grafana.key
    state: absent
  when: ansible_pkg_mgr == "apt"

- name: Remove old Grafana APT repository if exists
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
    state: absent
  loop:
    - "deb {{ grafana_apt_repo_url }} stable main"
    - "deb [signed-by=/etc/apt/keyrings/grafana.key] {{ grafana_apt_repo_url }} stable main"
  when: ansible_pkg_mgr == "apt"

- name: "Import Grafana GPG key"
  become: true
  ansible.builtin.get_url:
    url: "{{ grafana_apt_repo_key_url }}"
    dest: /etc/apt/keyrings/grafana.gpg
    mode: '0644'
    force: true
  when: ansible_pkg_mgr == "apt" and keyrings_exists is defined

- name: Ensure downloaded file for key is a binary keyring
  shell: "cat /etc/apt/keyrings/grafana.gpg | gpg --dearmor | sudo tee /etc/apt/keyrings/grafana.gpg > /dev/null"
  when: ansible_pkg_mgr == "apt"

- name: "Add Grafana's repository to APT sources list"
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] {{ grafana_apt_repo_url }} stable main"
    state: present
  when: ansible_pkg_mgr == "apt"

- name: "Add Grafana's repository to yum/dnf systems"
  become: true
  ansible.builtin.yum_repository:
    baseurl: "{{ grafana_rpm_repo_url }}"
    name: "grafana"
    description: "grafana"
    gpgcheck: true
    gpgkey: "{{ grafana_rpm_repo_key_url }}"
    state: present
  when: ansible_os_family == "RedHat"

- name: "Install grafana-agent"
  become: true
  ansible.builtin.package:
    name: "grafana-agent"
    state: "present"

- name: Ensure Grafana Agent WAL directory exists
  become: true
  ansible.builtin.file:
    path: /var/lib/grafana-agent/wal
    state: directory
    owner: grafana-agent
    group: grafana-agent
    mode: '0750'

- name: "Enable grafana-agent"
  become: true
  ansible.builtin.service:
    name: "grafana-agent"
    state: "started"
    enabled: true

# Deploy config file from template and restart the agent
- name: "Configure agent"
  become: true
  ansible.builtin.template:
    src: "templates/grafana-agent.yaml.j2"
    dest: "/etc/grafana-agent.yaml"
    mode: "0440"
    owner: "root"
    group: "grafana-agent"
  notify: "Restart grafana agent instance"
