---
- name: Stop and disable firewalld
  service:
    name: firewalld
    state: stopped
    enabled: no
  when: not enable_firewalld
  ignore_errors: true

- name: Start and enable firewalld
  service:
    name: firewalld
    state: started
    enabled: yes
  when: enable_firewalld

- name: Stop and disable iptables
  service:
    name: iptables
    state: stopped
    enabled: no
  ignore_errors: true
