---
# Purpose: Take the raw /machines/ payload from _read_machines.yml and build
# every lookup map the rest of the machines flow needs. One pass over the
# data; everything downstream is dict access.
#
# Expects:
#   - maas_nodes_list  : raw list from _read_machines.yml
#   - groups['maas_machines'] : inventory group used to build inventory_by_short
# Returns:
#   - _nodes              : same list, filtered to entries with a hostname
#   - maas_by_hostname    : { fqdn-or-short : <node_obj> }
#   - maas_host_to_macs   : { hostname : [<mac>, ...] }
#   - maas_host_to_ifaces : { hostname : [<iface_obj>, ...] }
#   - maas_host_to_status : { hostname : "Ready"|"Deployed"|... }
#   - _short_names        : list of MAAS hostnames (used for dup-check)
#   - maas_short_to_id    : { hostname : system_id }
#   - maas_by_short       : { hostname : <node_obj> }
#   - inventory_by_short  : { short_name : inventory_hostname (FQDN) }
# Side effects: none. Pure local transform.

- name: Init _nodes dict
  set_fact:
    _nodes: "{{ maas_nodes_list | selectattr('hostname','defined') | list }}"
  no_log: true

- name: Build maps keyed by FQDN (single pass, no loop)
  set_fact:
    maas_by_hostname: >-
      {{ dict(
           _nodes | map(attribute='hostname') 
           | zip(_nodes)
         ) }}
    maas_host_to_macs: >-
      {{ dict(
           _nodes | map(attribute='hostname')
           | zip(
               _nodes
               | map(attribute='interface_set')
               | map('default', [])
               | map('map', attribute='mac_address')
               | map('list')
             )
         ) }}
    maas_host_to_ifaces: >-
      {{ dict(
           _nodes | map(attribute='hostname')
           | zip(
               _nodes | map(attribute='interface_set') | map('default', [])
             )
         ) }}
    maas_host_to_status: >-
      {{ dict(
           _nodes | map(attribute='hostname')
           | zip(_nodes | map(attribute='status_name'))
         ) }}
  no_log: true

# Short names list (dedup check can use this)
# Build short name list (from MAAS payload, no regex needed)
- name: Build short name list
  set_fact:
    _short_names: >-
      {{
        (maas_by_hostname | default({}))
        | dict2items
        | map(attribute='value.hostname')
        | reject('equalto', None)
        | list
      }}

# short -> id
- name: Build maas_short_to_id
  set_fact:
    maas_short_to_id: >-
      {{
        dict(
          (
            (maas_by_hostname | default({}))
            | dict2items
            | map(attribute='value.hostname')
            | reject('equalto', None)
          )
          | zip(
              (maas_by_hostname | default({}))
              | dict2items
              | map(attribute='value.system_id')
            )
        )
      }}

# short -> object
- name: Build maas_by_short
  set_fact:
    maas_by_short: >-
      {{
        dict(
          (
            (maas_by_hostname | default({}))
            | dict2items
            | map(attribute='value.hostname')
            | reject('equalto', None)
          )
          | zip(
              (maas_by_hostname | default({}))
              | dict2items
              | map(attribute='value')
            )
        )
      }}
  no_log: true

# short -> ansible inventory_host
- name: Build inventory_by_short
  set_fact:
    inventory_by_short: >-
      {{
        (inventory_by_short | default({}))
        | combine({ (inv_fqdn.split('.')[0]): inv_fqdn })
      }}
  loop: "{{ groups['maas_machines'] }}"
  loop_control:
    loop_var: inv_fqdn
