---
# Install Teleport
# Ubuntu / Debian

- name: Install dependencies
  apt:
    name: curl
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Add Teleport GPG key
  get_url:
    url: https://apt.releases.teleport.dev/gpg
    dest: /usr/share/keyrings/teleport-archive-keyring.asc
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: Add Teleport repo (pinned major)
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/teleport-archive-keyring.asc] https://apt.releases.teleport.dev/ubuntu {{ ansible_distribution_release }} stable/v15"
    state: present
  when: ansible_os_family == "Debian"

- name: Install Teleport (pinned)
  apt:
    name: "teleport{{ teleport_pkg_version }}"
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

# -------------------------
# RHEL / CentOS / EL9

- name: Remove any old teleport repo
  file:
    path: /etc/yum.repos.d/teleport.repo
    state: absent

- name: Clean dnf metadata
  command: dnf clean all
  changed_when: false

- name: Install base deps safely
  dnf:
    name:
      - curl
      - dnf-plugins-core
    state: present
    disablerepo: "*"
    enablerepo: "baseos,appstream"

- name: Install versionlock plugin (EL9)
  dnf:
    name: dnf-command(versionlock)
    state: present

- name: Read OS ID
  shell: ". /etc/os-release && echo $ID"
  register: os_release_id
  changed_when: false

- name: Add Teleport repo
  command: >
    dnf config-manager --add-repo
    https://yum.releases.teleport.dev/{{ os_release_id.stdout | trim }}/{{ ansible_distribution_major_version }}/Teleport/{{ ansible_architecture }}/stable/v15/teleport.repo
  args:
    creates: /etc/yum.repos.d/teleport.repo

- name: Install Teleport
  dnf:
    name: "teleport-{{ teleport_version }}"
    state: present
    update_cache: true

- name: Lock Teleport version
  command: dnf versionlock add teleport-{{ teleport_version }}
  args:
    creates: /etc/dnf/plugins/versionlock.list
